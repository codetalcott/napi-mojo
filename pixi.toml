[workspace]
authors = ["Wm Talcott <wtalcott@gmail.com>"]
channels = ["conda-forge", "https://conda.modular.com/max-nightly/"]
name = "napi-mojo"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
nightly-update = { cmd = "bash ../mojo-nightly-updater/bump-nightly.sh --project .", description = "Update to latest Mojo/MAX nightly" }

[dependencies]
# max (not plain mojo) brings in the linalg / layout packages the GPU addon
# needs. CPU-only users are unaffected — max is a superset of mojo from the
# same nightly channel.
max = ">=26.3.0.dev2026040905"
