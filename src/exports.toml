# src/exports.toml — Function declarations for code generation
#
# Simple typed functions and classes go here. The code generator produces
# callback trampolines and registration code.
#
# Async functions: add async = true and execute_body (pure computation, no N-API).
# Allowed types for async args/returns: number, int32, uint32, int64.
#
# mojo_fn: instead of body, name a pure Mojo function to call. The generator
# wraps it with type-checked arg extraction and return-value wrapping.
# The Mojo function must be importable via extra_imports below.
#
# Usage: node scripts/generate-addon.mjs
# Output: src/generated/callbacks.mojo

# --- Extra imports added verbatim to callbacks.mojo when mojo_fn is used ---
extra_imports = ["from addon.user_fns import square_pure", "from addon.user_fns import clamp_pure", "from addon.user_fns import uppercase_pure", "from addon.user_fns import sum_array_pure", "from addon.user_fns import negate_bool_pure", "from addon.user_fns import add_int32_pure", "from addon.user_fns import describe_pure", "from addon.user_fns import reverse_strings_pure", "from addon.user_fns import safe_divide_pure", "from addon.user_fns import find_name_pure", "from addon.struct_fns import echo_config_pure", "from addon.struct_fns import config_summary_pure"]

# --- Example declarations ---
# These mirror existing hand-written functions for demonstration.
# In practice, you'd declare NEW functions here and keep existing
# ones in lib.mojo until you're ready to migrate.

[functions.example_add]
js_name = "exampleAdd"
args = ["number", "number"]
returns = "number"
body = """
var a = JsNumber.from_napi_value(_b, env, args[0])
var b = JsNumber.from_napi_value(_b, env, args[1])
return JsNumber.create(_b, env, a + b).value
"""

[functions.example_greet]
js_name = "exampleGreet"
args = ["string"]
returns = "string"
body = """
var name = JsString.from_napi_value(_b, env, arg0)
return JsString.create(_b, env, "Hello, " + name + "!").value
"""

[functions.example_is_positive]
js_name = "exampleIsPositive"
args = ["number"]
returns = "boolean"
body = """
var n = JsNumber.from_napi_value(_b, env, arg0)
return JsBoolean.create(_b, env, n > 0.0).value
"""

# --- Phase 27: new type token examples ---

[functions.example_add_uint32]
js_name = "exampleAddUInt32"
args = ["uint32", "uint32"]
returns = "uint32"
body = """
var a = JsUInt32.from_napi_value(_b, env, args[0])
var b = JsUInt32.from_napi_value(_b, env, args[1])
return JsUInt32.create(_b, env, a + b).value
"""

[functions.example_double_int64]
js_name = "exampleDoubleInt64"
args = ["int64"]
returns = "int64"
body = """
var n = JsInt64.from_napi_value(_b, env, arg0)
return JsInt64.create(_b, env, n * 2).value
"""

[functions.example_negate_bool]
js_name = "exampleNegateBool"
args = ["bool"]
returns = "bool"
body = """
var b = JsBoolean.from_napi_value(_b, env, arg0)
return JsBoolean.create(_b, env, not b).value
"""

[functions.example_has_key]
js_name = "exampleHasKey"
args = ["object", "string"]
returns = "boolean"
body = """
return JsBoolean.create(_b, env, JsObject(args[0]).has(_b, env, args[1])).value
"""

[functions.example_array_len]
js_name = "exampleArrayLen"
args = ["array"]
returns = "number"
body = """
return JsNumber.create_int(_b, env, Int(JsArray(arg0).length(_b, env))).value
"""

[functions.example_nullable_echo]
js_name = "exampleNullableEcho"
args = ["any?"]
returns = "any"
body = """
return arg0
"""

# --- C1: mojo_fn auto-trampoline examples ---
# square(x): calls pure Mojo fn square_pure(x: Float64) -> Float64
[functions.square]
js_name = "square"
args = ["number"]
returns = "number"
mojo_fn = "square_pure"

# clamp(val, lo, hi): calls pure Mojo fn clamp_pure(Float64, Float64, Float64) -> Float64
[functions.clamp]
js_name = "clamp"
args = ["number", "number", "number"]
returns = "number"
mojo_fn = "clamp_pure"

# --- Step 3: mojo_fn with string type ---
# uppercase(s): calls pure Mojo fn uppercase_pure(s: String) -> String
[functions.uppercase]
js_name = "uppercase"
args = ["string"]
returns = "string"
mojo_fn = "uppercase_pure"

# --- Step 3: mojo_fn with number[] type ---
# sumArrayPure(items): calls pure Mojo fn sum_array_pure(items: List[Float64]) -> Float64
[functions.sum_array]
js_name = "sumArrayPure"
args = ["number[]"]
returns = "number"
mojo_fn = "sum_array_pure"

# --- C4: 3-arg function example (tests N>=3 generator path) ---
[functions.example_clamp]
js_name = "exampleClamp"
args = ["number", "number", "number"]
returns = "number"
body = """
var val = JsNumber.from_napi_value(_b, env, args[0])
var lo  = JsNumber.from_napi_value(_b, env, args[1])
var hi  = JsNumber.from_napi_value(_b, env, args[2])
var result = val
if result < lo:
    result = lo
if result > hi:
    result = hi
return JsNumber.create(_b, env, result).value
"""

# --- Phase 31: async function example ---
# asyncSum: adds two numbers on a worker thread, returns Promise<number>
[functions.async_sum]
js_name = "asyncSum"
args = ["number", "number"]
returns = "number"
async = true
execute_body = """
ptr[].result = ptr[].input0 + ptr[].input1
"""

# --- Phase 28: generated class example ---
# ExamplePoint stores x, y as "_x" / "_y" own properties.
# Using underscore prefix avoids napi_set_named_property silently failing
# when a prototype getter with the same name exists (inherited accessor blocks
# data property creation without a matching setter).

[classes.example_point]
js_name = "ExamplePoint"
constructor_args = ["number", "number"]
constructor_body = """
JsObject(this_val).set_named_property(_b, env, "_x", args[0])
JsObject(this_val).set_named_property(_b, env, "_y", args[1])
"""

[classes.example_point.getters.x]
returns = "number"
body = """
return JsObject(this_val).get_named_property(_b, env, "_x")
"""

[classes.example_point.getters.y]
returns = "number"
body = """
return JsObject(this_val).get_named_property(_b, env, "_y")
"""

[classes.example_point.instance_methods.sum]
returns = "number"
body = """
var xv = JsNumber.from_napi_value(_b, env, JsObject(this_val).get_named_property(_b, env, "_x"))
var yv = JsNumber.from_napi_value(_b, env, JsObject(this_val).get_named_property(_b, env, "_y"))
return JsNumber.create(_b, env, xv + yv).value
"""

# --- Phase 30: setters and static methods ---

[classes.example_point.setters.x]
body = """
JsObject(this_val).set_named_property(_b, env, "_x", val)
return val
"""

[classes.example_point.setters.y]
body = """
JsObject(this_val).set_named_property(_b, env, "_y", val)
return val
"""

[classes.example_point.static_methods.isPoint]
args = ["any"]
returns = "boolean"
body = """
if js_typeof(_b, env, arg0) != NAPI_TYPE_OBJECT:
    return JsBoolean.create(_b, env, False).value
return JsBoolean.create(_b, env, JsObject(arg0).has_property(_b, env, "_x")).value
"""

