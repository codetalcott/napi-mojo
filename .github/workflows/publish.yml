name: Publish

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Mojo addon
        run: pixi run bash build.sh

      # Mirrors test.yml retry: macOS workers occasionally SIGABRT/SIGSEGV at
      # exit due to a Mojo 1.0.0b1 gap (no thin C-ABI fn-pointer for `def`s
      # at finalizer registration sites). Retry 3× absorbs the flake without
      # masking real regressions (a deterministic bug fails all 3).
      - name: Run tests (retry on intermittent flake)
        run: |
          for attempt in 1 2 3; do
            if npm test; then exit 0; fi
            echo "::warning::npm test attempt $attempt failed; retrying"
            sleep 2
          done
          echo "::error::npm test failed 3 attempts in a row — likely a real regression"
          exit 1

      # GC finalizer suite is gated on --expose-gc, so `npm test` skips
      # all 6 tests by design. Run them explicitly so finalizer
      # regressions can't ship in a release. Same 3× retry as above.
      - name: Run GC finalizer tests (retry on intermittent flake)
        run: |
          for attempt in 1 2 3; do
            if npm run test:gc; then exit 0; fi
            echo "::warning::npm run test:gc attempt $attempt failed; retrying"
            sleep 2
          done
          echo "::error::npm run test:gc failed 3 attempts in a row — likely a real regression"
          exit 1

      - name: Bundle runtime libraries
        run: pixi run bash scripts/bundle-runtime.sh

      - name: Upload binary and runtime libs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            build/index.node
            build/*.dylib
            build/*.so

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage platform packages
        run: |
          ls -R artifacts/
          cp artifacts/darwin-arm64/index.node npm/darwin-arm64/index.node
          cp artifacts/darwin-arm64/*.dylib npm/darwin-arm64/ 2>/dev/null || true
          cp artifacts/linux-x64/index.node npm/linux-x64/index.node
          cp artifacts/linux-x64/*.so npm/linux-x64/ 2>/dev/null || true

      - name: Sync versions from root package.json
        run: node scripts/sync-versions.mjs

      - name: Publish @napi-mojo/darwin-arm64
        run: npm publish --access public --provenance || [[ "$?" == "1" && $(npm view @napi-mojo/darwin-arm64 version 2>/dev/null) == "$(node -p 'require("./package.json").version')" ]]
        working-directory: npm/darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN2 }}

      - name: Publish @napi-mojo/linux-x64
        run: npm publish --access public --provenance || [[ "$?" == "1" && $(npm view @napi-mojo/linux-x64 version 2>/dev/null) == "$(node -p 'require("./package.json").version')" ]]
        working-directory: npm/linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN2 }}

      - name: Publish napi-mojo
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN2 }}
