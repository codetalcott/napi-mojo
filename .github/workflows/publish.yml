name: Publish

on:
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Mojo addon
        run: pixi run bash build.sh

      - name: Run tests
        run: npm test

      - name: Bundle runtime libraries
        run: pixi run bash scripts/bundle-runtime.sh

      - name: Upload binary and runtime libs
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            build/index.node
            build/*.dylib
            build/*.so

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage platform packages
        run: |
          cp artifacts/darwin-arm64/build/index.node npm/darwin-arm64/index.node
          cp artifacts/darwin-arm64/build/*.dylib npm/darwin-arm64/ 2>/dev/null || true
          cp artifacts/linux-x64/build/index.node npm/linux-x64/index.node
          cp artifacts/linux-x64/build/*.so npm/linux-x64/ 2>/dev/null || true

      - name: Sync versions from root package.json
        run: node scripts/sync-versions.mjs

      - name: Publish @napi-mojo/darwin-arm64
        run: npm publish --access public --provenance || [[ "$?" == "1" && $(npm view @napi-mojo/darwin-arm64 version 2>/dev/null) == "$(node -p 'require("./package.json").version')" ]]
        working-directory: npm/darwin-arm64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN2 }}

      - name: Publish @napi-mojo/linux-x64
        run: npm publish --access public --provenance || [[ "$?" == "1" && $(npm view @napi-mojo/linux-x64 version 2>/dev/null) == "$(node -p 'require("./package.json").version')" ]]
        working-directory: npm/linux-x64
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN2 }}

      - name: Publish napi-mojo
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN2 }}
