name: Publish

on:
  release:
    types: [published]
  # Rehearsal trigger. Runs everything EXCEPT the three npm publish steps, so
  # the release pipeline can be exercised without shipping anything. This is
  # not a convenience: until it existed, the only way to find out whether this
  # workflow still worked was to cut a release and watch. Dependabot had
  # already bumped upload-artifact v4 -> v7 and download-artifact v4 -> v8
  # here, and neither had ever executed — test.yml uses no artifacts, so a
  # fully green CI proved nothing about the artifact round-trip that the
  # staging step below depends on.
  #
  # Deliberately has no "actually publish" input. Publishing happens on a
  # release and nowhere else; a boolean that flips a manual run into a real
  # publish is a footgun, and a failed release publish can be re-run from the
  # Actions UI instead.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: latest

      - name: Install Node.js dependencies
        run: npm ci

      - name: Build Mojo addon
        run: pixi run bash build.sh

      # No retry wrapper — mirrors test.yml. The flake these steps used to
      # absorb was a real use-after-free in the TypedPayload finalizer (fixed
      # in e2f4efe), not the Mojo `def` fn-pointer gap originally blamed.
      # A release gate especially must not mask a deterministic regression.
      - name: Run tests
        run: npm test

      # GC finalizer suite is gated on --expose-gc, so `npm test` skips all 6
      # tests by design. Run them explicitly so finalizer regressions can't
      # ship in a release.
      - name: Run GC finalizer tests
        run: npm run test:gc

      - name: Bundle runtime libraries
        run: pixi run bash scripts/bundle-runtime.sh

      # bundle-runtime.sh rewrites install names and rpaths and re-signs the
      # binary — and until this step, nothing verified the result. `npm test`
      # above runs against the PRE-bundle build, so a botched rpath rewrite or
      # a failed codesign would sail through every gate and ship. The whole
      # "fully self-contained, no Mojo installation needed" claim in that
      # script's header was asserted and never checked.
      #
      # Loading from a scratch directory with the dyld/ld search paths cleared
      # is the consumer's situation: no pixi environment, no Mojo anywhere.
      # asyncRuntimeInitOk() is the sharp end of it — init_async_runtime()
      # dlopen()s libKGENCompilerRTShared by leaf name, which resolves only
      # because index.node already pulled it in via @loader_path/$ORIGIN. If
      # the bundling is wrong that returns false, and the consumer silently
      # loses all thread parallelism rather than getting an error.
      - name: Verify bundled binary is self-contained
        run: |
          set -euo pipefail
          EXT=$([ "$(uname -s)" = "Darwin" ] && echo dylib || echo so)
          for lib in libKGENCompilerRTShared libAsyncRTMojoBindings \
                     libAsyncRTRuntimeGlobals libMSupportGlobals; do
            test -f "build/${lib}.${EXT}" \
              || { echo "::error::bundle-runtime.sh did not produce build/${lib}.${EXT}"; exit 1; }
          done
          rm -rf /tmp/selfcontained && mkdir -p /tmp/selfcontained
          cp build/index.node "build/"*."${EXT}" /tmp/selfcontained/
          env -u DYLD_LIBRARY_PATH -u DYLD_FALLBACK_LIBRARY_PATH -u LD_LIBRARY_PATH \
            node -e "
              const a = require('/tmp/selfcontained/index.node');
              const greeting = a.hello();
              if (greeting !== 'Hello from Mojo!') {
                throw new Error('bundled binary returned: ' + greeting);
              }
              if (a.asyncRuntimeInitOk() !== true) {
                throw new Error(
                  'bundled binary loads, but the Mojo async runtime did not ' +
                  'initialize from the bundled libraries — parallelize_safe() ' +
                  'would silently run sequentially for every consumer'
                );
              }
              console.log('bundled binary is self-contained:', greeting);
            "

      - name: Upload binary and runtime libs
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform }}
          path: |
            build/index.node
            build/*.dylib
            build/*.so

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm

    steps:
      - uses: actions/checkout@v7

      # node-version 24 (npm 11.16.0) is REQUIRED, not a preference. npm's OIDC
      # trusted-publishing auth landed in npm 11.5.1; Node 22 bundles npm 10.9.8,
      # which never attempts the OIDC exchange and can only authenticate with a
      # token. That is what broke the v0.5.0 publish: the registry rejected the
      # token and returned E404 on PUT (npm returns 404 rather than 401/403 for
      # scoped packages so it can't leak whether a package exists). Do not pin
      # this back to 22 — the build job above is separate and can move freely.
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      # The runtime-lib copies used to end in `2>/dev/null || true`, which
      # turned "the artifacts are not where we expect" into "publish a
      # platform package containing index.node and none of the libraries it
      # needs" — a package that installs cleanly and then fails at require().
      # bundle-runtime.sh runs under `set -euo pipefail` and always emits all
      # four libraries, so a missing one is never normal; it means the artifact
      # round-trip changed shape. Fail here instead.
      - name: Stage platform packages
        run: |
          set -euo pipefail
          ls -R artifacts/
          stage() {
            local platform="$1" ext="$2" dest="npm/$1"
            cp "artifacts/${platform}/index.node" "${dest}/index.node"
            for lib in libKGENCompilerRTShared libAsyncRTMojoBindings \
                       libAsyncRTRuntimeGlobals libMSupportGlobals; do
              cp "artifacts/${platform}/${lib}.${ext}" "${dest}/${lib}.${ext}"
            done
            echo "staged ${platform}: $(ls -1 "${dest}"/*.node "${dest}"/*."${ext}" | wc -l | tr -d ' ') files"
          }
          stage darwin-arm64 dylib
          stage linux-x64 so

      - name: Sync versions from root package.json
        run: node scripts/sync-versions.mjs

      # No NODE_AUTH_TOKEN on any publish step, deliberately. These packages
      # authenticate via npm trusted publishing (OIDC), which is why the job
      # needs `id-token: write` and `environment: npm` — both must match what
      # is registered on npmjs.com, along with this file's name (publish.yml).
      # npm's own guidance is to NOT set a token alongside trusted publishing:
      # a present token can take precedence over the OIDC path and put you back
      # on the 90-day expiry treadmill that caused the v0.5.0 failure. If a
      # publish ever 404s again, check the trusted-publisher config on npmjs.com
      # before reaching for a token — adding one back is not the fix.
      - name: Publish @napi-mojo/darwin-arm64
        if: github.event_name == 'release'
        run: npm publish --access public --provenance || [[ "$?" == "1" && $(npm view @napi-mojo/darwin-arm64 version 2>/dev/null) == "$(node -p 'require("./package.json").version')" ]]
        working-directory: npm/darwin-arm64

      - name: Publish @napi-mojo/linux-x64
        if: github.event_name == 'release'
        run: npm publish --access public --provenance || [[ "$?" == "1" && $(npm view @napi-mojo/linux-x64 version 2>/dev/null) == "$(node -p 'require("./package.json").version')" ]]
        working-directory: npm/linux-x64

      - name: Publish napi-mojo
        if: github.event_name == 'release'
        run: npm publish --access public --provenance
