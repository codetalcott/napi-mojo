name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["macos-latest", "ubuntu-latest"]') || fromJSON('["macos-latest"]') }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Install Node.js dependencies
        run: npm ci

      # src/generated/ is checked in but `npm run build` never regenerates it,
      # so the generator can silently drift from its own output — it did, twice,
      # and a regeneration would have regressed the build. Any idiom migration
      # must patch the templates too; this is the gate that proves it.
      - name: Verify generated sources are up to date
        run: |
          npm run generate:addon
          git diff --exit-code src/generated/

      - name: Build Mojo addon
        run: pixi run bash build.sh

      # examples/ is not reachable from src/lib.mojo, so build.sh never
      # type-checks it — which is exactly why all three examples had rotted
      # into non-compiling states across several nightlies. They also reach
      # framework code nothing else does (runtime.mojo, js_mojo_array.mojo,
      # the env-only Js* overloads), so this is real coverage, not tidiness.
      - name: Build examples
        run: |
          for ex in examples/*-addon.mojo; do
            echo "::group::$ex"
            pixi run mojo build --emit shared-lib -I src "$ex" -o "/tmp/$(basename "$ex" .mojo).so"
            echo "::endgroup::"
          done

      # macOS workers occasionally SIGABRT/SIGSEGV at exit due to a
      # known Mojo 1.0.0b1 gap: the address-of-local-var pattern napi-mojo
      # uses at finalizer registration sites doesn't yield a thin C-ABI
      # function pointer for `def`s — the broken pointer crashes when
      # N-API invokes it at env teardown. Linux is more deterministic
      # (we've worked around the consistent failure mode in
      # set_instance_data_fn); macOS 15-arm64 hits it intermittently as
      # the image's malloc/teardown timing changes between runner
      # releases. Retry 3× catches the residual flake without masking a
      # real regression: a deterministic bug would still fail all 3.
      # Remove once Mojo exposes function-address syntax for `def`s.
      - name: Run tests (retry on intermittent flake)
        run: |
          for attempt in 1 2 3; do
            if npm test; then exit 0; fi
            echo "::warning::npm test attempt $attempt failed; retrying"
            sleep 2
          done
          echo "::error::npm test failed 3 attempts in a row — likely a real regression"
          exit 1

      # GC finalizer suite is gated on --expose-gc, so `npm test` skips
      # all 6 tests by design. Run them explicitly so finalizer
      # regressions can't slip through CI. Same 3× retry as above
      # because these tests exercise the finalizer registration sites
      # that trigger the macOS exit-time flake described above.
      - name: Run GC finalizer tests (retry on intermittent flake)
        run: |
          for attempt in 1 2 3; do
            if npm run test:gc; then exit 0; fi
            echo "::warning::npm run test:gc attempt $attempt failed; retrying"
            sleep 2
          done
          echo "::error::npm run test:gc failed 3 attempts in a row — likely a real regression"
          exit 1
