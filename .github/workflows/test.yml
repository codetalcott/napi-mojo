name: Test

on:
  # push: paths-ignore is safe here — nothing gates a push, so skipping the
  # run on a docs-only commit just saves CI minutes.
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  # pull_request: NO paths-ignore, deliberately. `test (macos-latest)` and
  # `test (ubuntu-latest)` are REQUIRED status checks on main. A filtered-out
  # workflow reports no checks at all rather than passing ones, so a docs-only
  # PR would never satisfy them and could only be landed by admin bypass.
  # Do not "optimize" this back — a docs-only PR costs ~1 CI-minute, and the
  # alternative is a permanently unmergeable PR.
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: ${{ github.event_name == 'pull_request' && fromJSON('["macos-latest", "ubuntu-latest"]') || fromJSON('["macos-latest"]') }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Install Node.js dependencies
        run: npm ci

      # src/generated/ is checked in but `npm run build` never regenerates it,
      # so the generator can silently drift from its own output — it did, twice,
      # and a regeneration would have regressed the build. Any idiom migration
      # must patch the templates too; this is the gate that proves it.
      - name: Verify generated sources are up to date
        run: |
          npm run generate:addon
          git diff --exit-code src/generated/

      - name: Build Mojo addon
        run: pixi run bash build.sh

      # examples/ is not reachable from src/lib.mojo, so build.sh never
      # type-checks it — which is exactly why all three examples had rotted
      # into non-compiling states across several nightlies. They also reach
      # framework code nothing else does (runtime.mojo, js_mojo_array.mojo,
      # the env-only Js* overloads), so this is real coverage, not tidiness.
      - name: Build examples
        run: |
          for ex in examples/*-addon.mojo; do
            echo "::group::$ex"
            pixi run mojo build --emit shared-lib -I src "$ex" -o "/tmp/$(basename "$ex" .mojo).so"
            echo "::endgroup::"
          done

      # No retry wrapper, deliberately. These steps used to retry 3×, blamed
      # on a Mojo `def` function-pointer gap at finalizer registration sites.
      # That diagnosis was wrong: the intermittent macOS SIGABRT/SIGSEGV was a
      # real use-after-free in the TypedPayload finalizer, fixed in e2f4efe.
      # The suite has since survived a month-long nightly migration, a 274-site
      # FFI rewrite, and Guard Malloc with MALLOC_STRICT_SIZE=1 — all clean.
      # A 3× retry masks a deterministic 1-in-3 regression, which is a failure
      # mode this codebase has actually shipped. If flake returns, diagnose it
      # (see the Guard Malloc recipe in CLAUDE.md); don't paper over it.
      - name: Run tests
        run: npm test

      # GC finalizer suite is gated on --expose-gc, so `npm test` skips all 6
      # tests by design. Run them explicitly so finalizer regressions can't
      # slip through CI.
      - name: Run GC finalizer tests
        run: npm run test:gc
